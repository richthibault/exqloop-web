<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Contact Us — Exquisite Loop</title>
    <th:block th:replace="~{layouts/main :: headtags}"></th:block>
</head>
<body class="with-captcha">

<th:block th:replace="~{layouts/main :: header}"></th:block>

<!-- ════════════════════════════════════════════ PAGE HEADER -->
<section class="page-header">
    <div class="container">
        <span class="eyebrow">Get in Touch</span>
        <h1 class="serif">Start a conversation.</h1>
        <p>Tell us about your project — we'll get back to you promptly.</p>
    </div>
</section>

<!-- ════════════════════════════════════════════ FORM -->
<section class="contact-section">
    <div class="container">
        <div class="contact-form-wrap">

            <div class="form-success" th:if="${success}" th:text="${success}"></div>

            <form th:action="@{/contact}" th:object="${contactForm}" method="post" id="contact-form" class="contact-form">

                <div class="form-global-error" th:if="${#fields.hasGlobalErrors()}">
                    <span th:each="err : ${#fields.globalErrors()}" th:text="${err}"></span>
                </div>

                <div class="form-field">
                    <label for="email" class="form-label">Email Address</label>
                    <input type="email" id="email"
                           th:field="*{email}"
                           th:classappend="${#fields.hasErrors('email')} ? 'error'"
                           class="form-input"
                           placeholder="you@example.com"
                           autocomplete="email"/>
                    <span class="form-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
                </div>

                <div class="form-field">
                    <label for="message" class="form-label">Message</label>
                    <textarea id="message"
                              th:field="*{message}"
                              th:classappend="${#fields.hasErrors('message')} ? 'error'"
                              class="form-textarea"
                              placeholder="Tell us about your project — what you're building, what problem you're solving, and any relevant timeline or budget context."></textarea>
                    <span class="form-error" th:if="${#fields.hasErrors('message')}" th:errors="*{message}"></span>
                </div>

                <button type="submit" class="btn-brand btn--cta">Send Message</button>

				<th:block  th:if="${!#strings.isEmpty(googleRecaptchaKey)}">
					<input type="hidden" id="recaptchaSiteKey" th:value="${googleRecaptchaKey}">
					<input type="hidden" id="g-recaptcha-response" name="g-recaptcha-response">

					<p class="recaptcha-notice">
						Protected by reCAPTCHA —
						<a href="https://policies.google.com/privacy" target="_blank" rel="noopener">Privacy</a>
						&amp;
						<a href="https://policies.google.com/terms" target="_blank" rel="noopener">Terms</a>
					</p>

				</th:block>

            </form>
        </div>
    </div>
</section>

<th:block th:replace="~{layouts/main :: footer}"></th:block>
<script th:src="@{/js/contact.js}"></script>

</body>
</html>
