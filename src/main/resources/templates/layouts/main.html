<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:fragment="headtags" th:remove="tag">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" th:href="@{/img/favicon-32x32.png}" sizes="32x32"/>
    <link rel="icon" th:href="@{/img/favicon-128x128.png}" sizes="128x128"/>
    <link rel="apple-touch-icon" th:href="@{/img/apple-touch-icon.png}"/>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body>

<div th:fragment="header" th:remove="tag">

    <header>
        <nav id="site-nav">
            <div class="nav-inner">

                <a href="/" class="nav-logo">
                    <img th:src="@{/img/logo-white-sm.png}" class="logo flipper" width="75" height="39" alt="Exquisite Loop">
                    <span class="logo-name">Exquisite Loop</span>
                </a>

                <div class="nav-links">
                    <a href="/" class="nav-link active">Home</a>
                    <a href="/about" class="nav-link">About</a>
                    <a href="/portfolio" class="nav-link">Portfolio</a>
                    <a href="/contact" class="nav-link">Contact Us</a>
                </div>

                <div class="nav-actions">
                    <a href="/contact" class="btn-brand nav-cta">Start a Project</a>
                    <button id="nav-toggle" class="nav-toggle" aria-label="Toggle menu" aria-expanded="false">
                        <svg id="nav-icon-open" width="22" height="22" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                        </svg>
                        <svg id="nav-icon-close" width="22" height="22" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </button>
                </div>

            </div>

            <div id="mobile-drawer">
                <nav>
                    <a href="/" class="nav-link active">Home</a>
                    <a href="/about" class="nav-link">About</a>
                    <a href="/portfolio" class="nav-link">Portfolio</a>
                    <a href="/contact" class="nav-link">Contact Us</a>
                    <a href="/contact" class="btn-brand">Start a Project</a>
                </nav>
            </div>
        </nav>
    </header>

</div>

<div th:fragment="footer" th:remove="tag">

    <footer>
        <div class="container">

            <a href="/" class="footer-logo">
                <img th:src="@{/img/logo-white-sm.png}" class="flipper" width="50" alt="Exquisite Loop">
                <span class="logo-name small">Exquisite Loop</span>
            </a>

            <nav>
                <a href="/">Home</a>
                <a href="/about">About</a>
                <a href="/portfolio">Portfolio</a>
                <a href="/contact">Contact Us</a>
            </nav>

            <small>&copy; <span class="copyright-years">2018</span> Exquisite Loop LLC. All rights reserved.</small>

        </div>
    </footer>

    <th:block th:if="${!#strings.isEmpty(googleAnalyticsId)}">
    <!-- Global site tag (gtag.js) - Google Analytics -->
    <script async="true" th:src="@{https://www.googletagmanager.com/gtag/js(id=${googleAnalyticsId})}"></script>
    <script th:inline="javascript">
    /*<![CDATA[*/
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', /*[[${googleAnalyticsId}]]*/ '');
    /*]]>*/
    </script>
    </th:block>

    <th:block th:if="${!#strings.isEmpty(googleRecaptchaKey)}">
    <script th:src="@{https://www.google.com/recaptcha/api.js(render=${googleRecaptchaKey})}"></script>
    </th:block>

    <script th:src="@{/js/globals.js}"></script>

</div>

</body>
</html>
